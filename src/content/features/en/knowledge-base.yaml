faq:
  - question: "What file types can I upload to the knowledge base?"
    answer: "PDF, Word documents, PowerPoint, Excel, plain text files, and web URLs. You can also import content from internal wikis or documentation platforms by providing links."
  - question: "How does the AI use the knowledge base when generating reports?"
    answer: "During report generation, the AI searches your knowledge base for relevant context based on what was discussed in the meeting. It pulls accurate product specs, pricing, technical details, or competitive info and integrates them into the appropriate report sections automatically."
  - question: "Can I control which documents the AI references?"
    answer: "Yes. You can organize documents by team, territory, or product line. You can also set certain documents as priority sources or restrict access to specific content based on user roles."
  - question: "What happens when I update a document in the knowledge base?"
    answer: "The AI uses the latest version immediately. Update a price list or product spec—all reports generated after that point will reference the new information. Previous reports remain unchanged."
  - question: "Is my sales documentation secure in the knowledge base?"
    answer: "Yes. All documents are encrypted at rest and in transit. Access controls ensure only authorized team members can view or upload content. Your knowledge base is completely isolated from other organizations."
  - question: "Can reps search the knowledge base directly?"
    answer: "Yes, through Max—the AI assistant. Reps can ask questions like 'What's our return policy?' or 'How do we handle enterprise SLA requests?' and get answers sourced directly from your uploaded documentation."
