faq:
  - question: "Which CRMs does Reedly integrate with?"
    answer: "Reedly currently integrates with HubSpot and Salesforce. Reports, commitments, and opportunities sync automatically to contact and deal records. Additional CRM connectors are in development."
  - question: "Can I push reports to Slack or Microsoft Teams?"
    answer: "Yes. Reedly integrates with Slack and Discord for real-time report sharing to team channels. Microsoft Teams integration is on the roadmap. You can also use our API to build custom Teams workflows."
  - question: "Does Reedly offer an API for custom integrations?"
    answer: "Yes. Reedly provides a REST API for custom integrations with proprietary tools, ERP systems, BI platforms, or any internal software. Documentation and developer support are included."
  - question: "How does automatic CRM sync work?"
    answer: "After a meeting is recorded and the report generated, Reedly maps structured sections to CRM fields and pushes data via API. You configure field mappings once; every subsequent report syncs automatically."
  - question: "Can I control which data gets pushed to which tool?"
    answer: "Yes. You define sync rules per integration—choose which report sections go to CRM, which summaries post to Slack, and which fields trigger automations. Full control over data routing."
  - question: "Is meeting data secure when syncing to third-party tools?"
    answer: "All data transfers use encrypted API connections. Reedly never stores CRM credentials. OAuth authentication ensures secure, auditable access to integrated platforms."
