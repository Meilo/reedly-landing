faq:
  - question: "How accurate is Reedly's automatic meeting transcription?"
    answer: "Reedly achieves 95%+ transcription accuracy using Deepgram and Voxtral AI models. This is significantly higher than consumer transcription apps because the system is trained specifically on professional business conversations, technical vocabulary, and varied audio environments."
  - question: "Does AI transcription work with accents and non-native speakers?"
    answer: "Yes. Reedly's transcription engine handles diverse English accents including regional variants, non-native speakers, and mixed-accent conversations. The AI models are trained on international business communication patterns, not just standard broadcast speech."
  - question: "Can transcription handle background noise during meetings?"
    answer: "Reedly is designed for real field conditions. Advanced audio processing filters ambient noise from cafés, factories, offices, and vehicles while preserving clear voice capture. This makes it reliable in environments where consumer apps fail."
  - question: "Does transcription recognize industry-specific terminology?"
    answer: "Yes. The AI transcription learns technical vocabulary, product names, and sector-specific terms from context. This is critical for B2B sales where accuracy on specifications, model numbers, and technical requirements directly impacts report quality."
  - question: "How long does transcription take after a meeting?"
    answer: "Transcription completes within the 2-minute report generation time. Audio processing and transcript creation happen simultaneously, so you get both accurate text and the structured report almost immediately after recording ends."
  - question: "Is the transcription secure and confidential?"
    answer: "All audio and transcription data is encrypted during transmission and storage. Reedly processes recordings securely and never shares transcripts with third parties. Your client conversations remain confidential."
