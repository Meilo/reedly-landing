faq:
  - question: "How does Reedly build client cards automatically?"
    answer: "Every time you record a meeting, Reedly's AI extracts company names, contact details, discussed needs, and relationship signals from the conversation. This data automatically updates or creates the relevant client card—no manual input required."
  - question: "What is the AI relationship score based on?"
    answer: "The relationship score analyzes conversation tone, client engagement level, objection patterns, commitment strength, and interaction frequency over time. It gives you a quantified measure of account health."
  - question: "Can I see client portfolio data in the mobile app?"
    answer: "Yes. The client portfolio is available in both the mobile app and the manager web hub. You can access complete client cards, interaction timelines, and aggregated needs on any device."
  - question: "How does client portfolio integrate with our CRM?"
    answer: "Reedly's client portfolio works independently but can complement your CRM. Reports and client data can be exported, and future integrations will enable direct CRM syncing for teams that need it."
  - question: "Can managers see the entire team's client portfolio?"
    answer: "Yes. In the manager hub, you can view aggregated portfolio data across your entire territory—see all client interactions, relationship scores, and needs by account or by rep."
  - question: "What happens if multiple reps meet the same client?"
    answer: "Reedly consolidates all interactions with the same client into one card, regardless of which rep recorded the meeting. You get a complete multi-rep interaction history for each account."
