use_cases:
  eyebrow: "Use cases"
  title: "Built for field teams who manage complex accounts"
  cards:
    - title: "Prepare for follow-up meetings"
      text: "Before meeting a client, review their complete history, previously discussed needs, and relationship score. Walk in fully prepared without hunting through old notes."
      icon: "book"
    - title: "Identify cross-sell opportunities"
      text: "See aggregated needs across your portfolio. Spot clients who mentioned requirements that match new products or services you can offer."
      icon: "target"
    - title: "Manage account transitions smoothly"
      text: "When accounts change hands, the new rep gets complete interaction history, key contacts, and relationship context—no knowledge lost in handoff."
