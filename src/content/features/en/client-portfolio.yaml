seo:
  title: "Sales Client Portfolio Management with AI | Reedly"
  description: "AI-enriched client cards automatically built from field reports. Track interactions, aggregate needs, and measure relationships across your portfolio."
  keywords: ["sales client portfolio management", "AI-enriched client card", "field client tracking"]
hero:
  eyebrow: "Client Portfolio · AI-Enriched"
  title: "Every client conversation.<br /><em>One intelligent portfolio.</em>"
  lead: "Reedly builds your client portfolio automatically from field reports. Track companies, contacts, interaction history, and relationship health—all enriched by AI. No manual data entry. Just structured client intelligence."
  cta_label: "Start free trial"
  cta_url: "/en#trial"
problem:
  eyebrow: "Challenge"
  title: "Client data lives everywhere.<br /><em>Except where you need it.</em>"
  lead: "Field sales teams collect valuable client insights daily, but most of it stays scattered across notes, memory, and old CRMs. Without a complete picture, relationships weaken and opportunities slip through."
  cards:
    - title: "Fragmented client history"
      text: "Notes in email, details in your head, last meeting recorded nowhere. When you need context before a call, you're piecing together fragments from three different places."
      icon: "shuffle"
    - title: "No relationship visibility"
      text: "How strong is your relationship with each account? Which clients are engaged, which are drifting? Without tracking interaction quality over time, you're flying blind."
      icon: "compass"
    - title: "Manual portfolio updates"
      text: "Updating client records after every meeting means choosing between accurate data and productive selling. Most reps choose selling—and the portfolio goes stale."
      icon: "clock"
solution:
  eyebrow: "How it works"
  title: "AI builds your portfolio.<br /><em>You focus on relationships.</em>"
  lead: "Every meeting you record with Reedly automatically enriches your client portfolio. AI extracts companies, contacts, needs, and sentiment—then aggregates everything into intelligent client cards."
  steps:
    - title: "Record meetings, enrich automatically"
      text: "Each recorded meeting updates the relevant client card. AI extracts mentioned needs, discussed products, key contacts, and relationship signals—no manual logging required."
    - title: "View aggregated client intelligence"
      text: "Every client card shows a complete timeline of interactions, aggregated needs across meetings, key contacts involved, and an AI-calculated relationship score based on engagement quality."
    - title: "Track portfolio health at a glance"
      text: "See which accounts are active, which need attention, and where opportunities are emerging. Filter by territory, relationship strength, or last interaction date."
