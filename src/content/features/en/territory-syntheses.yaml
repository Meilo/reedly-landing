faq:
  - question: How does territory synthesis differ from reading individual reports?
    answer: Individual reports show what happened in one meeting. Territory synthesis automatically identifies patterns, trends, and outliers across dozens or hundreds of reports — the strategic layer that's impossible to see manually. Reedly weighs by recency, deal size, and repetition to surface what actually matters.
  - question: Can I filter syntheses by time period, rep, or segment?
    answer: Yes. Generate syntheses for any date range (week, month, quarter, custom), filter by individual rep or team, and segment by customer type, product line, or region. Each synthesis is regenerated on demand with current data.
  - question: What appears in a territory synthesis?
    answer: Prioritized trends (recurring themes across reports), flagged risks (competitive threats, deal blockers, churn signals), ranked opportunities (upsell patterns, whitespace, emerging needs), and aggregated metrics (meeting volume, engagement quality, sentiment shifts). Structured for strategic action, not raw data.
  - question: Does synthesis require manual tagging or categorization?
    answer: No. Reedly's AI automatically extracts and categorizes insights from the structured reports your team creates. No taxonomy setup, no tagging workflow, no data entry. The synthesis engine works on the same 11-section reports generated from field recordings.
  - question: How often should I generate territory syntheses?
    answer: Most sales managers generate weekly syntheses for team meetings and monthly syntheses for pipeline reviews. The synthesis is always current — generate on demand whenever you need strategic perspective. No batch processing or scheduled reports required.
  - question: Can I share syntheses with executives or other departments?
    answer: Yes. Territory syntheses are shareable via link or export. Common use cases include executive briefings, product team feedback loops, and cross-functional strategy alignment. You control access within the Manager Hub.
