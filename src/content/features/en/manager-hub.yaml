seo:
  title: "Sales Manager Dashboard & Team Hub | Reedly"
  description: "Centralize your field sales team reports in one dashboard. Track performance, generate territory syntheses, and manage your commercial team."
  keywords: ["sales manager dashboard", "commercial director hub", "field sales team management"]
hero:
  eyebrow: "Manager Hub — Web Interface"
  title: "Your entire team's activity.<br /><em>One sales manager dashboard.</em>"
  lead: "Reedly Manager Hub centralizes every field report from your commercial team in a single web interface. Track performance, spot trends, manage members, and generate strategic territory syntheses — no more chasing reps for updates."
  cta_label: "Try Manager Hub"
  cta_url: "/en#trial"
problem:
  eyebrow: "Problem"
  title: "Managing a field team<br /><em>shouldn't mean chasing information.</em>"
  lead: "Sales directors spend hours hunting down reports, consolidating data from scattered sources, and manually building territory overviews. Critical insights get buried in individual updates."
  cards:
    - title: "Reports scattered everywhere"
      text: "CRM notes, email updates, Slack messages, handwritten notes. Your team's field intelligence lives in a dozen places — impossible to get the full picture."
      icon: "shuffle"
    - title: "No visibility between check-ins"
      text: "You only know what happened in last week's sales meeting. Real-time trends, emerging objections, and competitive moves stay invisible until it's too late."
      icon: "alert"
    - title: "Territory analysis takes days"
      text: "Building a regional overview means reading through dozens of individual reports, extracting patterns manually, and synthesizing insights in spreadsheets."
      icon: "clock"
solution:
  eyebrow: "Solution"
  title: "Centralized intelligence.<br /><em>Automated insights.</em>"
  lead: "Manager Hub gives you instant access to every field interaction across your commercial territory — structured, searchable, and synthesized automatically."
  steps:
    - title: "Your reps use Reedly in the field"
      text: "Every team member records client meetings with the Reedly mobile app. Reports flow automatically to your centralized commercial director hub within 2 minutes of each appointment."
    - title: "You access the unified dashboard"
      text: "Log into the Manager Hub web interface. Every report from every rep appears in one place — filterable by date, region, rep, client, or keyword. No manual collection required."
    - title: "Generate territory syntheses instantly"
      text: "Select a time period or region. Reedly's AI analyzes all reports and generates strategic syntheses showing trends, recurring objections, competitive mentions, and opportunity patterns across your entire territory."
benefits:
  eyebrow: "Benefits"
  title: "From information chaos<br /><em>to strategic clarity.</em>"
  cards:
    - title: "100% report collection rate"
      text: "Because reps generate reports in 2 minutes without typing, you actually get them. No more missing updates or incomplete CRM notes — every meeting is documented."
      icon: "target"
    - title: "Real-time team visibility"
      text: "See what's happening in the field today, not last week. Track meeting volume, client engagement, and sales activity as it happens across your commercial team."
      icon: "zap"
    - title: "Territory insights in minutes"
      text: "Generate strategic overviews of any region, period, or segment instantly. Spot market trends, identify training needs, and adjust strategy based on actual field data."
      icon: "compass"
    - title: "Objective performance tracking"
      text: "Member stats show meeting frequency, report quality, client coverage, and engagement metrics. Coach based on data, not gut feeling or selective memory."
      icon: "chart"
    - title: "Searchable team knowledge base"
      text: "Find every mention of a competitor, objection, product, or client across your entire team's history. Your field intelligence becomes a strategic asset, not lost conversations."
      icon: "search"
    - title: "Simple team management"
      text: "Add members, assign territories, set permissions, and manage access from one interface. No IT tickets, no admin overhead — you control your sales manager dashboard directly."
      icon: "users"
use_cases:
  eyebrow: "Use Cases"
  title: "Built for field sales directors."
  cards:
    - title: "Multi-region sales directors"
      text: "Manage teams across multiple territories without traveling constantly. Get the same visibility into distant regions as local ones — see what's working where and why."
      icon: "globe"
    - title: "Sales managers coaching teams"
      text: "Review actual client conversations before 1-on-1s. Coach on real objections, successful pitches, and missed opportunities — not vague recollections or self-reported wins."
      icon: "users"
    - title: "Commercial directors tracking pipeline"
      text: "Identify which prospects are advancing, which are stalling, and why — across your entire territory. Spot deal risks and opportunities before they appear in CRM stage changes."
      icon: "layers"
    - title: "Field sales leadership preparing strategy"
      text: "Build quarterly plans based on real market intelligence. Analyze hundreds of client conversations to identify product gaps, pricing objections, and competitive positioning opportunities."
      icon: "target"
faq:
  - question: "How do sales reports from field reps reach the Manager Hub?"
    answer: "When any team member generates a report using the Reedly mobile app, it automatically appears in your Manager Hub within 2 minutes. No manual upload or sync required — reports flow directly from field to dashboard as they're created."
  - question: "Can I control which managers see which team members' reports?"
    answer: "Yes. You assign members to managers and set permissions within the Hub. Each sales manager sees only their assigned team's reports, while commercial directors can configure broader access across regions or the entire organization."
  - question: "What's included in a territory synthesis?"
    answer: "Territory syntheses aggregate data from all selected reports to show: recurring client needs and objections, competitive mentions and positioning, product interest patterns, market trends, engagement quality, and strategic opportunities. Generated automatically from your team's field reports in under a minute."
  - question: "How does team performance tracking work?"
    answer: "Member stats show quantitative metrics (meeting frequency, report count, client coverage) and qualitative indicators (average report completeness, engagement depth, follow-up consistency). All derived automatically from the structured reports your reps generate — no manual data entry."
  - question: "Can I search across all my team's reports?"
    answer: "Yes. The sales manager dashboard includes full-text search across every report from every team member. Find all mentions of a specific competitor, objection, product, or client across your entire field intelligence history."
  - question: "Do I need separate software to manage the team?"
    answer: "No. Team management is built into Manager Hub — add members, assign territories, set permissions, and track usage from the same interface where you view reports and generate syntheses. One commercial director hub for all field sales management needs."
