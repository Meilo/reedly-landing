seo:
  title: "AI Meeting Report Generator | Reedly"
  description: "Automatic client visit reports in under 2 minutes. AI-generated structured sales reports with 11 sections. 1-click PDF export."
  keywords: ["automatic client visit report", "AI meeting report", "automated sales report"]
hero:
  eyebrow: "AI Structured Report"
  title: "The <em>automatic client visit report</em><br />your CRM has been waiting for."
  lead: "Reedly turns every field conversation into a complete 11-section report in under 2 minutes. Executive summary, needs, objections, commitments, next steps — structured, searchable, shareable. No typing required."
  cta_label: "Try free for 14 days"
  cta_url: "/en#trial"
problem:
  eyebrow: "Challenge"
  title: "Information gets captured.<br /><em>Structure gets lost.</em>"
  lead: "Field sales reps return from client visits with notes, voice memos, or just memory. What's missing isn't the data — it's the organization that makes it useful."
  cards:
    - title: "Unstructured notes waste time"
      text: "Bullet points and fragments mean managers spend 15 minutes per report just figuring out what happened, what was promised, and what comes next."
      icon: "document"
    - title: "Critical details buried or missing"
      text: "Objections get summarized as 'price concerns.' Commitments hide in paragraph three. Next steps exist somewhere — if they were written down at all."
      icon: "search"
    - title: "No standardization across teams"
      text: "Every rep has their own reporting style. Comparing accounts, tracking patterns, or generating territory insights requires manual translation work."
      icon: "shuffle"
solution:
  eyebrow: "How It Works"
  title: "From recording to<br /><em>structured report.</em>"
  lead: "Reedly's AI doesn't just transcribe — it analyzes the conversation and automatically organizes insights into 11 standardized sections."
  steps:
    - title: "Record the client meeting"
      text: "Launch the app before entering the meeting. Reedly captures the conversation in the background with optimized battery usage and 95%+ transcription accuracy."
    - title: "AI generates structured sections"
      text: "In under 2 minutes, the AI meeting report is ready: executive summary, client profile, needs expressed, objections raised, commitments made, next steps, opportunities, risks, recommendations, and more."
    - title: "Export or share instantly"
      text: "Review the automated sales report in-app, export as PDF with 1 click, or let it sync automatically to your CRM. Every report follows the same structure, every time."
benefits:
  eyebrow: "Advantages"
  title: "Why sales teams choose<br /><em>AI-structured reports.</em>"
  cards:
    - title: "11 standardized sections"
      text: "Every automatic client visit report includes executive summary, client profile, needs, objections, products discussed, competitors mentioned, commitments, next steps, opportunities, risks, and recommendations."
      icon: "layers"
    - title: "Reports ready in under 2 minutes"
      text: "From end of meeting to complete structured document — faster than manually typing a bullet list, and infinitely more useful."
      icon: "zap"
    - title: "1-click PDF export"
      text: "Generate professional client visit reports to attach to emails, share with managers, or archive. No formatting, no copy-paste."
      icon: "download"
    - title: "Consistent across the entire team"
      text: "Every rep uses the same structure. Managers can compare accounts, spot patterns, and generate insights without decoding individual writing styles."
      icon: "users"
    - title: "Nothing gets forgotten"
      text: "Objections, commitments, risks — if it was said, it's captured and categorized. No more 'I think they mentioned something about delivery times.'"
      icon: "shield"
    - title: "Searchable and analyzable"
      text: "Standard sections mean you can search for all objections about pricing, all commitments made in Q2, or all next steps overdue — across hundreds of reports."
      icon: "search"
use_cases:
  eyebrow: "Use Cases"
  title: "Who uses AI meeting reports"
  cards:
    - title: "Field sales reps"
      text: "Stop spending evenings writing reports. Get back 45+ minutes per meeting while delivering higher-quality documentation than manual notes ever could."
      icon: "target"
    - title: "Sales managers"
      text: "Review your team's meetings in minutes, not hours. Every automatic client visit report follows the same structure — spot risks, track commitments, identify coaching opportunities instantly."
      icon: "users"
    - title: "Account managers"
      text: "Hand off accounts with complete context. The AI-generated report captures everything: client needs, competitive threats, open commitments, relationship risks."
      icon: "building"
    - title: "Sales operations teams"
      text: "Analyze hundreds of automated sales reports to identify win/loss patterns, common objections, competitive intelligence, and training needs — all from standardized data."
      icon: "chart"
faq:
  - question: "What's included in the 11-section AI meeting report?"
    answer: "Every report includes: executive summary, client profile, needs expressed, objections and responses, products/services discussed, competitors mentioned, mutual commitments, next steps with deadlines, identified opportunities, potential risks, and strategic recommendations."
  - question: "How accurate is the automatic client visit report generation?"
    answer: "Reedly transcribes with 95%+ accuracy, then uses AI to extract and categorize information into structured sections. You can review and edit any section before sharing or exporting."
  - question: "Can I customize the report sections?"
    answer: "The 11 core sections are standardized to ensure consistency across teams. You can add free-form notes to any section and edit AI-generated content before finalizing the report."
  - question: "How long does it take to generate an automated sales report?"
    answer: "Under 2 minutes from the end of recording. A 45-minute client meeting produces a complete structured report faster than you can return to your car."
  - question: "Does the PDF export include all 11 sections?"
    answer: "Yes. The 1-click PDF export generates a formatted document with all sections, your company branding options, meeting metadata, and any edits you've made to the AI-generated content."
  - question: "Can managers access reports from the entire team?"
    answer: "Yes. The Reedly web hub centralizes all automatic client visit reports from your team, with filtering, search, and territory-level synthesis features."
