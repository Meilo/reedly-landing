seo:
  title: "AI Structured Report — Automatic Sales Reports | Reedly"
  description: "Generate automatic client visit reports in under 2 minutes. 11-section structured format: summary, needs, objections, next steps. 1-click PDF export."
  keywords: ["automatic client visit report", "AI meeting report", "automated sales report"]
hero:
  eyebrow: "AI Structured Report"
  title: "Automatic client visit report.<br /><em>Generated in under 2 minutes.</em>"
  lead: "Reedly transforms every field conversation into a structured 11-section report — executive summary, needs, objections, commitments, next steps. Nothing to type. Nothing to forget."
  cta_label: "Try Reedly free"
  cta_url: "/en#trial"
problem:
  eyebrow: "Challenge"
  title: "Critical details.<br /><em>Buried in notes.</em>"
  lead: "Field reps spend hours each week writing reports in CRMs. Key information gets lost, formatting varies by rep, and managers waste time decoding unstructured notes."
  cards:
    - title: "No standard format"
      text: "Every rep writes reports differently. Managers can't compare visits or spot patterns across the territory when each report follows its own structure."
      icon: "shuffle"
    - title: "Critical info gets buried"
      text: "Objections, commitments, and next steps get lost in long paragraphs. What matters most is hardest to find when you need it."
      icon: "search"
    - title: "CRM fields stay empty"
      text: "Reps skip fields, abbreviate, or copy-paste. Incomplete data means missed opportunities and blind spots in the pipeline."
      icon: "alert"
solution:
  eyebrow: "How it works"
  title: "From conversation<br /><em>to structured report.</em>"
  lead: "Reedly's AI analyzes the full transcript and automatically extracts information into 11 predefined sections. The same format, every time, for every rep."
  steps:
    - title: "Record the client visit"
      text: "One tap starts background recording. Reedly captures the entire conversation — questions, objections, commitments, technical details."
    - title: "AI generates the structured report"
      text: "In under 2 minutes, Reedly's AI processes the transcript and fills all 11 sections: executive summary, client profile, needs, objections, products discussed, competitors mentioned, commitments, next steps, opportunities, risks, recommendations."
    - title: "Export or share instantly"
      text: "1-click PDF export for email or CRM upload. Share directly with managers through the Reedly Hub web interface."
benefits:
  eyebrow: "Benefits"
  title: "Every report.<br /><em>Complete and consistent.</em>"
  cards:
    - title: "11 structured sections"
      text: "Executive summary, client profile, expressed needs, objections and responses, products discussed, competitors mentioned, mutual commitments, next steps and deadlines, identified opportunities, detected risks, strategic recommendations. Every visit, same format."
      icon: "document"
    - title: "Generated in under 2 minutes"
      text: "From end of meeting to complete report in less time than it takes to drive to the next appointment. No typing, no formatting, no blank fields."
      icon: "zap"
    - title: "Nothing gets missed"
      text: "The AI extracts every objection, commitment, and next step from the transcript. No more forgetting client concerns or promised follow-ups."
      icon: "target"
    - title: "1-click PDF export"
      text: "Generate a formatted PDF instantly. Attach to emails, upload to your CRM, or share with colleagues without copy-pasting."
      icon: "download"
    - title: "Consistent across the team"
      text: "Every rep's reports follow the same structure. Managers can compare visits, spot trends, and coach effectively when data is standardized."
      icon: "layers"
    - title: "Ready for CRM integration"
      text: "Structured sections map cleanly to CRM fields. Copy specific sections or export the full report — data stays organized either way."
      icon: "building"
use_cases:
  eyebrow: "Use cases"
  title: "Who uses automatic AI meeting reports"
  cards:
    - title: "Field sales reps"
      text: "Stop spending evenings writing reports. Generate complete, professional client visit summaries automatically after every appointment."
      icon: "users"
    - title: "Sales managers"
      text: "Review team visits faster with consistent formatting. Spot coaching opportunities, track commitments, and identify risks across all reps."
      icon: "chart"
    - title: "Technical sales engineers"
      text: "Capture complex product discussions and technical objections accurately. Every specification, concern, and solution gets documented automatically."
      icon: "flask"
    - title: "Regional directors"
      text: "Get structured visibility into field activity across territories. Compare performance, analyze needs patterns, and make data-driven decisions."
      icon: "globe"
faq:
  - question: "What sections are included in the AI structured report?"
    answer: "Every Reedly report contains 11 sections: executive summary, client profile, expressed needs, objections and responses, products discussed, competitors mentioned, mutual commitments, next steps and deadlines, identified opportunities, detected risks, and strategic recommendations. This structure is automatic for every visit."
  - question: "How long does it take to generate an automatic client visit report?"
    answer: "Reedly generates the complete 11-section structured report in under 2 minutes after the recording ends. The AI processes the full transcript and fills every section automatically — no manual input required."
  - question: "Can I edit the AI-generated sales report?"
    answer: "Yes. While the AI generates a complete structured report automatically, you can edit any section before exporting or sharing. The report stays in the same 11-section format to maintain consistency."
  - question: "How do I export the automated sales report?"
    answer: "One-click PDF export from the mobile app. The formatted report downloads instantly, ready to email, upload to your CRM, or share through the Reedly Hub web interface."
  - question: "Does the AI meeting report work for all types of B2B sales visits?"
    answer: "Yes. Reedly's structured report format works for discovery calls, product demos, technical discussions, negotiation meetings, and follow-up visits. The 11 sections adapt to capture whatever happens in the conversation."
  - question: "Can managers access structured reports from the whole team?"
    answer: "Yes. The Reedly Hub web interface centralizes all team reports in the same structured format. Managers can review, compare, and generate territory syntheses from consistent data across all reps."
