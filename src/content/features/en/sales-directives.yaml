seo:
  title: "Sales Team Directives & Compliance Tracking | Reedly"
  description: "Define sales directives with checkpoints. Reedly's AI automatically evaluates each report for compliance and surfaces objective scores."
  keywords: ["sales team directives", "sales objective management", "AI sales report compliance"]
hero:
  eyebrow: "Sales Directives"
  title: "Set <em>sales team directives.</em><br />Track compliance automatically."
  lead: "Define sales objectives with specific checkpoints. Reedly's AI evaluates every field report against active directives and surfaces a compliance score — no manual review needed."
  cta_label: "Start free trial"
  cta_url: "/en#trial"
problem:
  eyebrow: "Challenge"
  title: "Directives get communicated.<br /><em>Execution never gets tracked.</em>"
  lead: "Sales managers issue objectives — new product focus, discovery questions, competitor intel. But there's no systematic way to verify what's actually happening in the field."
  cards:
    - title: "Directives lost in email threads"
      text: "Objectives get announced in Monday meetings and buried in Slack channels. Field reps forget what they're supposed to focus on by Wednesday."
      icon: "alert"
    - title: "No visibility into execution"
      text: "Managers have no idea if reps are asking the right questions, mentioning new products, or gathering competitive intel until the quarterly review."
      icon: "search"
    - title: "Manual report review doesn't scale"
      text: "Reading through dozens of reports to check if directives were followed takes hours. Most managers simply don't have the time."
      icon: "clock"
solution:
  eyebrow: "How it works"
  title: "Define once.<br /><em>Track everywhere.</em>"
  lead: "Create directives with specific checkpoints. The AI automatically checks each report and flags what was covered — or missed."
  steps:
    - title: "Define your sales directives"
      text: "Create directives with clear checkpoints: discuss new product line, qualify budget, ask about current provider, gather competitive pricing. Set them active across your territory or specific reps."
    - title: "Reps record meetings as usual"
      text: "Field salespeople use Reedly to record client meetings. They don't need to remember every directive — the AI does the checking for them after the meeting."
    - title: "AI evaluates compliance automatically"
      text: "The AI scans each report against active directives and surfaces a compliance score. Managers see at a glance which objectives were met and what was missed across all meetings."
benefits:
  eyebrow: "Benefits"
  title: "Turn objectives into trackable execution."
  cards:
    - title: "Directives that actually get followed"
      text: "When reps know their reports are evaluated against objectives, execution improves. Checkpoints turn abstract goals into concrete actions."
      icon: "target"
    - title: "Instant compliance visibility"
      text: "See which directives are being executed and which are being ignored — across the entire team, without reading a single report manually."
      icon: "chart"
    - title: "Coach with real data"
      text: "Identify which reps consistently miss key checkpoints. Base coaching conversations on objective compliance scores, not gut feeling."
      icon: "users"
    - title: "Adapt strategy faster"
      text: "If a directive shows low compliance across the board, you'll know immediately. Adjust messaging, provide training, or revise the objective before the quarter ends."
      icon: "zap"
    - title: "No extra work for field reps"
      text: "Salespeople don't fill out compliance checklists. They record meetings as usual — the AI handles evaluation automatically from the report content."
      icon: "shield"
    - title: "Objective performance measurement"
      text: "Replace subjective report reviews with consistent AI evaluation. Every directive is checked the same way across every report, every time."
      icon: "layers"
use_cases:
  eyebrow: "Use cases"
  title: "Real directives. Real tracking."
  cards:
    - title: "New product launch rollout"
      text: "Create a directive with checkpoints: mention Product X, explain key differentiator, gauge interest level. Track adoption across the sales team week by week."
      icon: "globe"
    - title: "Competitive intelligence gathering"
      text: "Set a directive to identify current providers, pricing information, and pain points with existing solutions. See which reps are uncovering intel and which aren't."
      icon: "search"
    - title: "Discovery methodology enforcement"
      text: "Define checkpoints for your qualification framework: budget confirmed, decision process mapped, key stakeholders identified. Measure adherence across the pipeline."
      icon: "compass"
    - title: "Compliance and documentation"
      text: "For regulated industries, create directives ensuring required topics are covered: contract terms discussed, compliance requirements addressed, documentation provided."
      icon: "document"
faq:
  - question: "How does the AI evaluate directive compliance?"
    answer: "The AI analyzes the content of each report section against the checkpoints you've defined. It identifies whether topics were discussed, questions were asked, or information was gathered — then assigns a compliance score based on how many checkpoints were met."
  - question: "Can I create different directives for different team members?"
    answer: "Yes. You can assign directives to specific reps, territories, or the entire team. This allows you to tailor objectives based on product focus, market segment, or rep experience level."
  - question: "Do salespeople see the compliance scores?"
    answer: "That's configurable. You can choose to show reps their own scores to encourage self-improvement, or keep evaluation visible only to managers for coaching purposes."
  - question: "What happens if a directive isn't relevant to a specific meeting?"
    answer: "The AI evaluates based on whether the topic was applicable. If a checkpoint doesn't make sense for a particular meeting type or client profile, it won't negatively impact the score."
  - question: "Can I track compliance trends over time?"
    answer: "Yes. The Manager Hub shows compliance trends by directive, by rep, and by time period. You can see if execution is improving, declining, or staying consistent as campaigns progress."
  - question: "How specific should directive checkpoints be?"
    answer: "The more specific, the better. Instead of 'discuss pricing,' use 'confirm budget range and decision timeline.' Clear checkpoints produce more accurate AI evaluation and more actionable insights."
