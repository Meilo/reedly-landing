seo:
  title: "Max: AI Sales Director Assistant | Reedly"
  description: "Ask questions about your team's activity, get instant analyses, and plan actions in natural language. The AI sales manager chatbot built for B2B."
  keywords: ["AI sales director assistant", "sales manager chatbot", "AI sales team management"]
hero:
  eyebrow: "Max — AI Manager Assistant"
  title: "Ask questions.<br />Get answers. <em>Not dashboards.</em>"
  lead: "Max is your AI sales director assistant that speaks your language. Ask about team performance, compare territories, identify coaching needs, plan directives — no filters, no exports, no SQL required."
  cta_label: "Try Max free"
  cta_url: "/en#trial"
problem:
  eyebrow: "Problem"
  title: "Data sits in reports.<br /><em>Insights hide in the noise.</em>"
  lead: "Sales managers have access to mountains of data but lack the time to extract actionable intelligence. Every strategic question requires manual analysis, spreadsheet exports, and guesswork."
  cards:
    - title: "Hours lost digging through reports"
      text: "Managers spend more time filtering dashboards and exporting CSVs than actually coaching their teams or planning territory strategy."
      icon: "clock"
    - title: "Questions answered too late"
      text: "By the time you've manually analyzed which reps are struggling with objections or which territories underperform, the opportunity to act has passed."
      icon: "alert"
    - title: "Strategic decisions made blind"
      text: "Without instant cross-analysis of team activity, managers rely on gut feeling rather than real conversation data to allocate resources and plan coaching."
      icon: "compass"
solution:
  eyebrow: "Solution"
  title: "The sales manager chatbot that<br /><em>understands strategy.</em>"
  lead: "Max analyzes every report from every rep across all territories. Just ask your question in plain English — get instant answers grounded in real customer conversations."
  steps:
    - title: "Ask in natural language"
      text: "Type or speak your question like you'd ask a colleague. Which reps close fastest? What objections are trending? Where are competitors gaining ground? No query language required."
    - title: "Max analyzes across all reports"
      text: "The AI sales director assistant instantly searches and cross-references every meeting report, extracting patterns, comparing performance, and surfacing insights you'd never find manually."
    - title: "Get answers and take action"
      text: "Receive clear answers with data to back them up. Then create coaching directives, plan territory actions, or schedule follow-ups — all within the same conversation."
benefits:
  eyebrow: "Benefits"
  title: "Strategic intelligence<br /><em>at conversation speed.</em>"
  cards:
    - title: "Ask anything, instantly"
      text: "No dashboard hunting. No pivot tables. Just ask Max about team activity, customer feedback, competitive mentions, or deal progress in plain language."
      icon: "zap"
    - title: "Cross-team analysis in seconds"
      text: "Compare rep performance, identify coaching needs, spot territory trends, and track directive compliance across your entire team with one question."
      icon: "users"
    - title: "Create directives from insights"
      text: "Turn insights into action immediately. Ask Max to identify a pattern, then create a sales directive for specific reps or the entire team based on what you learned."
      icon: "target"
    - title: "Coaching grounded in real conversations"
      text: "Stop guessing what reps struggle with. Max shows you exactly which objections they face, which products they undersell, and where deals stall — backed by actual meeting transcripts."
      icon: "brain"
    - title: "No training required"
      text: "If you can ask a question, you can use Max. The AI sales manager chatbot understands business language, not technical queries or filter logic."
      icon: "book"
    - title: "Always learning your business"
      text: "Max gets smarter with every report generated. It learns your products, your competitors, your territory structure, and your team's vocabulary."
      icon: "layers"
use_cases:
  eyebrow: "Use Cases"
  title: "From question<br /><em>to strategic action.</em>"
  cards:
    - title: "Identify coaching opportunities"
      text: "Ask which reps struggle most with pricing objections, or which team members never mention certain product features. Get names, examples, and coaching suggestions instantly."
      icon: "users"
    - title: "Track competitive intelligence"
      text: "Ask where competitors are mentioned most, which alternatives customers prefer, or how your team responds to competitive objections. Spot threats before they spread."
      icon: "shield"
    - title: "Plan territory strategy"
      text: "Compare territory performance, identify underserved customer segments, or find which regions mention specific needs most. Allocate resources based on real demand."
      icon: "compass"
    - title: "Monitor directive execution"
      text: "After sending a sales directive, ask Max if reps are implementing it. Check if new messaging appears in meetings or if behavior has actually changed."
      icon: "target"
faq:
  - question: "What can I ask Max, the AI sales director assistant?"
    answer: "Anything about your team's sales activity captured in Reedly reports. Ask about rep performance, customer objections, product mentions, competitor references, territory trends, deal progress, coaching needs, or directive compliance. Max analyzes all meeting reports to answer."
  - question: "Does Max replace my sales dashboards?"
    answer: "No, Max complements them. Dashboards show metrics — Max answers strategic questions those metrics can't. Instead of filtering charts to find which reps mention competitors, just ask Max. It's analysis on demand, not visualization."
  - question: "How does the sales manager chatbot know my business context?"
    answer: "Max learns automatically from every report your team generates. It understands your product catalog, your competitors, your territory structure, and your team's selling patterns. No manual configuration needed — just start asking questions."
  - question: "Can Max create actions or just answer questions?"
    answer: "Both. Max can answer analytical questions, but also help you take action — create sales directives for your team, plan coaching sessions, schedule territory reviews, or flag reports for follow-up, all in natural language."
  - question: "Is Max available on mobile or just the web hub?"
    answer: "Max is part of the Reedly Manager Hub, accessible via web browser. Reps use the mobile app to record meetings and generate reports. Managers use the web hub and Max to analyze team activity and manage strategy."
  - question: "Does Max use data from outside Reedly?"
    answer: "No. Max analyzes only the meeting reports generated by your team through Reedly. It doesn't connect to your CRM, email, or other tools — ensuring data privacy and keeping answers focused on real customer conversations."
