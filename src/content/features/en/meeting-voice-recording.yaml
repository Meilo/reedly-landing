seo:
  title: "Meeting Voice Recording App for Field Sales | Reedly"
  description: "One-tap meeting voice recording for B2B field sales. Captures client conversations in background, battery-optimized, works offline."
  keywords: ["meeting voice recording app", "client meeting recording", "field sales audio recording"]
hero:
  eyebrow: "Meeting Voice Recording"
  title: "Record client meetings.<br /><em>Without lifting a finger.</em>"
  lead: "One tap before you walk in. Reedly captures the entire conversation in the background — battery optimized, works offline, and automatically deletes the audio after your report is generated."
  cta_label: "Start free trial"
  cta_url: "/en#trial"
problem:
  eyebrow: "Problem"
  title: "You can't take notes<br /><em>and close deals.</em>"
  lead: "Field sales reps are expected to remember every detail from client meetings while staying present in the conversation. The choice is always the same — engage fully or document accurately. You can't do both."
  cards:
    - title: "Details lost in translation"
      text: "Client objections, competitor mentions, technical requirements — the crucial details slip away the moment you're back in your car. Mental notes don't cut it when deals depend on accuracy."
      icon: "alert"
    - title: "Note-taking kills rapport"
      text: "Looking down at your notepad or phone during a client meeting breaks eye contact, interrupts flow, and signals you're not fully present. Great salespeople listen. Not type."
      icon: "users"
    - title: "Voice memos pile up"
      text: "Recording quick voice notes after meetings creates a backlog you'll never transcribe. By Friday, you have 12 audio files and zero memory of what was said in which meeting."
      icon: "music"
solution:
  eyebrow: "Solution"
  title: "Background recording.<br /><em>Zero distraction.</em>"
  lead: "Reedly runs silently in the background from the moment you tap record. No screen to watch, no battery drain, no internet required. Just you and your client — while every word is captured."
  steps:
    - title: "Tap once before the meeting"
      text: "Open Reedly in your car, tap the record button, then put your phone away. The app keeps recording in your pocket or bag — even if you switch apps or lock your screen."
    - title: "Focus on the conversation"
      text: "Your phone stays silent and out of sight. Battery-optimized recording means you can capture back-to-back meetings all day without worrying about power or storage."
    - title: "Stop when you leave"
      text: "Tap stop as you walk out. The audio is encrypted and uploaded when you have connection. After your structured report is generated, the audio file is permanently deleted."
benefits:
  eyebrow: "Benefits"
  title: "Built for field sales.<br /><em>Not conference rooms.</em>"
  cards:
    - title: "One-tap operation"
      text: "No settings to adjust, no levels to check. Tap record before you walk in, tap stop when you leave. That's it."
      icon: "microphone"
    - title: "Background recording"
      text: "Lock your phone, check your calendar, reply to a text — recording continues uninterrupted. Your phone works normally while capturing audio."
      icon: "layers"
    - title: "Battery optimized"
      text: "Engineered for all-day field use. Record five 1-hour meetings on a single charge without draining your battery."
      icon: "zap"
    - title: "Works completely offline"
      text: "No connection needed during recording. Audio is saved locally and uploads automatically when you're back on WiFi or cellular."
      icon: "globe"
    - title: "Audio deleted after processing"
      text: "Your recording is transcribed and turned into a structured report, then permanently deleted. Only the text report remains — no audio stored long-term."
      icon: "shield"
    - title: "Captures every detail"
      text: "Client objections, competitor mentions, technical specs, pricing discussions — everything is captured with 95%+ accuracy for your AI-generated report."
      icon: "target"
use_cases:
  eyebrow: "Use Cases"
  title: "Who uses meeting voice recording?"
  cards:
    - title: "Field sales reps"
      text: "Capture client conversations during site visits, product demos, and consultations without breaking eye contact or disrupting the flow of conversation."
      icon: "users"
    - title: "Account managers"
      text: "Document quarterly business reviews, renewal discussions, and strategic planning sessions with complete accuracy — even in multi-hour meetings."
      icon: "building"
    - title: "Sales engineers"
      text: "Record technical discovery calls and product demonstrations to capture exact requirements, integration questions, and technical objections without manual note-taking."
      icon: "flask"
    - title: "Sales managers on ride-alongs"
