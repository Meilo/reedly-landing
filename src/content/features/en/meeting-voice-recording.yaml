      icon: "compass"
faq:
  - question: "Is it legal to record client meetings?"
    answer: "Recording laws vary by location. In many jurisdictions, you need consent from all parties before recording. Reedly does not provide legal advice — check your local laws and always inform clients when recording meetings."
  - question: "How long can I record continuously?"
    answer: "Reedly supports continuous recording for up to 3 hours per session, which covers virtually all client meetings. For longer sessions, simply stop and start a new recording."
  - question: "Does recording work without internet connection?"
    answer: "Yes. Recording and transcription work completely offline. Audio is saved locally on your device and automatically uploads when you reconnect to WiFi or cellular data."
  - question: "What happens to the audio after the meeting?"
    answer: "Audio is encrypted during upload, transcribed with 95%+ accuracy, then used to generate your structured report. Once the report is complete, the original audio file is permanently deleted from our servers."
  - question: "Does background recording drain my phone battery?"
    answer: "Reedly is optimized for all-day field use. You can record multiple 1-hour meetings on a single charge. The app uses advanced compression and battery management designed specifically for mobile sales teams."
  - question: "Can I record on Android and iOS?"
    answer: "Yes. Reedly's meeting voice recording works on both iOS and Android devices with identical functionality and battery optimization."
