faq:
  - question: "L'enregistrement vocal fonctionne-t-il sans connexion internet ?"
    answer: "Oui, totalement. L'enregistrement audio se fait en local sur votre smartphone. Une fois de retour en zone couverte, l'audio est automatiquement synchronisé et transcrit."
  - question: "Quelle est l'autonomie batterie avec l'enregistrement en continu ?"
    answer: "Nos algorithmes permettent d'enregistrer 3 à 4 heures de RDV consécutifs sur une charge standard. L'app est optimisée spécifiquement pour les tournées terrain longues."
  - question: "Dois-je informer mon client que j'enregistre le rendez-vous ?"
    answer: "Oui, le consentement oral est obligatoire en France et en Europe (RGPD). Reedly vous rappelle cette obligation au lancement de chaque enregistrement. La plupart des clients acceptent volontiers quand vous expliquez que cela garantit un meilleur suivi."
  - question: "L'audio est-il stocké quelque part après le rendez-vous ?"
    answer: "Non. L'enregistrement audio est automatiquement supprimé après génération du rapport structuré. Seule la transcription texte et le rapport sont conservés — jamais le fichier audio."
  - question: "L'enregistrement vocal capte-t-il bien dans les environnements bruyants ?"
    answer: "Oui. Reedly utilise des algorithmes de traitement audio optimisés pour les environnements industriels, chantiers et open spaces. Le taux de transcription reste supérieur à 95% même en milieu bruyant."
  - question: "Puis-je mettre en pause l'enregistrement pendant le RDV ?"
    answer: "Oui. Vous pouvez mettre en pause et reprendre l'enregistrement à tout moment — utile pour les pauses, interruptions ou discussions hors sujet."
