seo:
  title: "Hub Manager · Tableau de bord équipe commerciale · Reedly"
  description: "Centralisez tous les rapports terrain de votre équipe. Synthèses stratégiques, stats membres, pilotage d'équipe en temps réel."
  keywords: ["tableau de bord manager commercial", "hub directeur commercial", "pilotage équipe vente terrain"]
hero:
  eyebrow: "Hub Manager · Interface web"
  title: "Le <em>tableau de bord manager commercial</em><br />qui centralise tout le terrain."
  lead: "Le Hub Manager regroupe tous les rapports de votre équipe commerciale en une seule interface. Synthèses stratégiques, statistiques par membre, gestion centralisée — sans ouvrir 15 CRM ou chasser les comptes-rendus par mail."
  cta_label: "Essayer le Hub Manager"
  cta_url: "/fr#trial"
problem:
  eyebrow: "Problème"
  title: "Vos commerciaux sont sur le terrain.<br /><em>Leurs infos restent invisibles.</em>"
  lead: "Les directeurs commerciaux passent leurs journées à courir après les rapports de visite, compiler des données éparpillées et deviner ce qui se passe vraiment en clientèle."
  cards:
    - title: "Reporting fragmenté et incomplet"
      text: "Les comptes-rendus arrivent par mail, Slack, WhatsApp ou pas du tout. Impossible de consolider une vue d'ensemble sans perdre des heures à tout recopier."
      icon: "shuffle"
    - title: "Aucune vision stratégique du territoire"
      text: "Vous gérez 8 commerciaux sur 3 régions, mais aucun outil ne vous dit quels concurrents montent, quelles objections reviennent ou quels secteurs ralentissent."
      icon: "search"
    - title: "Coaching à l'aveugle"
      text: "Sans accès aux échanges terrain réels, vous coachez sur des chiffres — pas sur les comportements, les arguments ou les opportunités manquées."
      icon: "alert"
solution:
  eyebrow: "Solution"
  title: "Un hub directeur commercial<br /><em>qui centralise l'activité terrain.</em>"
  lead: "Le Hub Manager rassemble automatiquement tous les rapports générés par votre équipe dans Reedly. Vous accédez en temps réel à l'activité commerciale complète — sans attendre, sans relancer, sans compiler."
  steps:
    - title: "Vos commerciaux enregistrent leurs RDV"
      text: "Chaque membre de l'équipe utilise l'app Reedly mobile. Chaque rendez-vous enregistré génère un rapport structuré en 11 sections en moins de 2 minutes."
    - title: "Les rapports remontent automatiquement"
      text: "Tous les comptes-rendus apparaissent instantanément dans votre Hub Manager web — classés par commercial, date, client ou territoire. Aucune saisie manuelle."
    - title: "Vous pilotez depuis une vue centralisée"
      text: "Dashboard avec statistiques d'équipe, synthèses stratégiques territoriales, gestion des membres, export de rapports — tout ce qu'il faut pour piloter sans perdre de temps."
benefits:
  eyebrow: "Avantages"
  title: "Tout le terrain,<br /><em>en un coup d'œil.</em>"
  cards:
    - title: "Dashboard centralisé avec tous les rapports"
      text: "Accédez à l'intégralité des comptes-rendus de votre équipe depuis une interface web unique. Filtrez par commercial, date, client ou territoire en 1 clic."
      icon: "layers"
    - title: "Synthèses stratégiques automatiques"
      text: "Reedly agrège automatiquement les données terrain : concurrents émergents, objections récurrentes, tendances sectorielles. Vous prenez des décisions sur des faits, pas des impressions."
      icon: "chart"
    - title: "Statistiques par membre d'équipe"
      text: "Nombre de RDV enregistrés, taux d'engagement, produits les plus discutés, objections fréquentes — suivez la performance et coachez avec des données qualitatives."
      icon: "users"
    - title: "Gestion d'équipe intégrée"
      text: "Ajoutez ou retirez des membres, assignez des territoires, gérez les permissions — tout depuis le Hub. Aucune administration externe."
      icon: "shield"
    - title: "Export et partage de rapports"
      text: "Téléchargez les rapports individuels ou consolidés en PDF. Partagez directement avec la direction, le marketing ou le service produit."
      icon: "download"
    - title: "Accès temps réel depuis n'importe où"
      text: "Interface web accessible depuis ordinateur, tablette ou mobile. Consultez l'activité terrain en déplacement, en réunion ou depuis le bureau."
      icon: "globe"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Qui utilise le Hub Manager ?"
  cards:
    - title: "Directeurs commerciaux multi-régions"
      text: "Pilotez 5 à 20 commerciaux répartis sur plusieurs territoires. Identifiez en temps réel les zones qui performent, les secteurs en difficulté et les leviers d'action prioritaires."
      icon: "compass"
    - title: "Sales managers en coaching terrain"
      text: "Accédez aux rapports de vos commerciaux avant les debriefs hebdomadaires. Préparez vos entretiens avec des exemples concrets tirés des échanges clients réels."
      icon: "target"
    - title: "Responsables grands comptes"
      text: "Suivez l'ensemble des interactions avec vos comptes stratégiques, même quand plusieurs commerciaux interviennent. Gardez une vision 360° de la relation client."
      icon: "building"
    - title: "Directions générales en PME/ETI"
      text: "Consultez l'activité commerciale sans passer par des rapports hebdomadaires incomplets. Vision claire et immédiate de ce qui se dit sur le terrain."
      icon: "book"
faq:
  - question: "Comment les rapports remontent-ils dans le Hub Manager ?"
    answer: "Chaque fois qu'un commercial génère un rapport via l'app mobile Reedly, celui-ci apparaît automatiquement dans le Hub Manager. Aucune synchronisation manuelle — tout est temps réel."
  - question: "Puis-je gérer les permissions d'accès par membre ?"
    answer: "Oui. Vous contrôlez qui voit quoi : certains membres peuvent consulter uniquement leurs propres rapports, d'autres accèdent à toute l'équipe. Vous gérez les rôles depuis le Hub."
  - question: "Le Hub Manager est-il inclus dans l'abonnement Reedly ?"
    answer: "Le Hub Manager est accessible dès le forfait Équipe. Les commerciaux utilisent l'app mobile, les managers accèdent au Hub web avec le même abonnement — pas de surcoût."
  - question: "Peut-on exporter les données pour les intégrer au CRM ?"
    answer: "Oui. Vous pouvez télécharger les rapports individuels ou consolidés en PDF, ou utiliser notre API pour connecter Reedly à votre CRM (Salesforce, HubSpot, Pipedrive…)."
  - question: "Les commerciaux voient-ils que je consulte leurs rapports ?"
    answer: "Non. Le Hub Manager est une interface de consultation pour les managers. Les commerciaux ne reçoivent aucune notification quand vous accédez à leurs comptes-rendus."
  - question: "Combien de temps sont conservés les rapports dans le Hub ?"
    answer: "Tous les rapports sont conservés indéfiniment dans votre Hub Manager. Vous pouvez consulter l'historique complet de l'activité terrain depuis le début de votre abonnement."
