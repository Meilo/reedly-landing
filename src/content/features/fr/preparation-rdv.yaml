faq:
  - question: "Comment l'IA compile-t-elle l'historique des RDV ?"
    answer: "Reedly analyse tous les rapports passés avec ce client — résumés, engagements, besoins, objections — et extrait automatiquement les informations clés pour préparer votre prochaine visite."
  - question: "Le briefing est-il généré automatiquement avant chaque RDV ?"
    answer: "Oui. Dès que vous avez un rendez-vous prévu, l'IA prépare un briefing structuré basé sur l'historique complet du client. Vous y accédez en un tap depuis l'app."
  - question: "Que contient exactement le briefing avant RDV ?"
    answer: "Le briefing inclut : dernier échange (résumé), engagements pris et non tenus, points de vigilance identifiés, besoins exprimés lors des précédents RDV, et décisions en attente."
  - question: "Est-ce que je peux voir les RDV menés par mes collègues ?"
    answer: "Oui, si vous êtes dans la même équipe. Vous avez accès à tous les rapports de RDV du client, quel que soit le commercial qui l'a rencontré — pour assurer la continuité."
  - question: "Combien de temps faut-il pour consulter le briefing ?"
    answer: "30 secondes maximum. Tout est structuré en sections claires — vous scannez l'essentiel avant d'entrer chez le client, sans rouvrir le CRM."
  - question: "Est-ce que Reedly s'intègre avec mon CRM ?"
    answer: "Oui. Reedly peut synchroniser les rapports avec votre CRM (Salesforce, HubSpot, Pipedrive…) pour que l'historique soit toujours à jour, sans double saisie."
