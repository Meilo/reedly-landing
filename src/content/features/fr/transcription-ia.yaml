  eyebrow: "Avantages"
  title: "Pourquoi la transcription IA<br /><em>Reedly fait la différence.</em>"
  cards:
    - title: "95%+ de précision garantie"
      text: "Modèles IA Deepgram et Voxtral optimisés pour la parole française et le contexte commercial. Taux de précision supérieur aux outils généralistes."
      icon: "target"
    - title: "Comprend les accents et le jargon métier"
      text: "La transcription s'adapte aux accents régionaux, au vocabulaire technique de votre secteur (industrie, santé, construction, distribution) et aux acronymes métier."
      icon: "brain"
    - title: "Fonctionne en environnement bruyant"
      text: "Algorithmes de filtrage audio pour capter la voix même dans un atelier, un chantier, un entrepôt ou un point de vente fréquenté."
      icon: "music"
    - title: "Identification automatique des interlocuteurs"
      text: "Le moteur IA distingue les voix et identifie qui parle à quel moment. Idéal pour les rendez-vous à plusieurs participants côté client."
      icon: "users"
    - title: "Transcription sécurisée et confidentielle"
