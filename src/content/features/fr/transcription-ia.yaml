faq:
  - question: "Quelle est la précision réelle de la transcription IA Reedly ?"
    answer: "Reedly garantit une précision supérieure à 95% grâce aux modèles IA Deepgram et Voxtral, spécialement optimisés pour la parole française en contexte commercial B2B. Cette précision est maintenue même avec des accents régionaux et du vocabulaire technique sectoriel."
  - question: "La transcription fonctionne-t-elle en environnement bruyant ?"
    answer: "Oui. Les algorithmes de filtrage audio de Reedly sont conçus pour capter la voix en environnement bruyant : atelier, chantier, entrepôt, point de vente. Le moteur IA isole la parole et réduit le bruit ambiant pour garantir une transcription exploitable."
  - question: "La transcription IA comprend-elle le vocabulaire métier de mon secteur ?"
    answer: "Oui. Les modèles IA de Reedly sont entraînés sur du vocabulaire commercial B2B multi-sectoriel. Ils reconnaissent les termes techniques, les acronymes métier et s'adaptent au contexte de votre industrie (industrie, santé, construction, distribution, services)."
  - question: "Que deviennent les transcriptions audio après le rendez-vous ?"
    answer: "Les transcriptions sont chiffrées de bout en bout et stockées de manière sécurisée sur des serveurs en Europe, conformément au RGPD. Vous seul et votre équipe (si partagé) y avez accès. Vous pouvez supprimer une transcription à tout moment depuis l'app."
  - question: "La transcription identifie-t-elle automatiquement les interlocuteurs ?"
    answer: "Oui. Le moteur IA de Reedly distingue les voix et identifie automatiquement les différents interlocuteurs pendant le rendez-vous. Idéal pour les réunions à plusieurs participants côté client, où il est crucial de savoir qui a exprimé quel besoin ou objection."
  - question: "Puis-je corriger la transcription si elle contient des erreurs ?"
    answer: "Oui. Vous pouvez consulter et corriger la transcription depuis l'app mobile ou le Hub web. Toute correction améliore également la génération du rapport structuré final, qui s'appuie sur la transcription comme base de travail."
