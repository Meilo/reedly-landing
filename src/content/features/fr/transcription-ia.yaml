problem:
  eyebrow: "Problème"
  title: "Une transcription manuelle<br /><em>perd l'essentiel.</em>"
  lead: "Prendre des notes en plein rendez-vous vous coupe de l'échange. Se fier à sa mémoire pour retranscrire après coup fait perdre 60% des détails cruciaux — chiffres exacts, objections formulées, engagements mutuels."
  cards:
    - title: "Impossible d'écouter et noter en même temps"
      text: "En griffonnant des notes, vous ratez les signaux faibles, le non-dit, les objections à peine formulées. Votre attention est divisée au pire moment."
      icon: "alert"
    - title: "La mémoire déforme les faits"
      text: "Le soir venu, impossible de se rappeler qui a dit quoi exactement. Les chiffres se mélangent, les engagements deviennent flous, les objections s'effacent."
      icon: "shuffle"
    - title: "Les outils classiques échouent sur le terrain"
      text: "Les transcriptions génériques ne comprennent ni les termes métier, ni les accents, ni le bruit ambiant d'un atelier ou d'un chantier."
      icon: "globe"
solution:
  eyebrow: "Solution"
  title: "Une transcription IA<br /><em>qui comprend votre métier.</em>"
  lead: "Reedly enregistre et transcrit automatiquement chaque rendez-vous avec une précision supérieure à 95%, grâce à des modèles IA spécialisés (Deepgram et Voxtral) entraînés pour le contexte commercial B2B."
  steps:
    - title: "Enregistrement en arrière-plan"
      text: "L'app capture l'audio pendant que vous restez concentré sur l'échange. Rien à surveiller, rien à manipuler pendant le rendez-vous."
    - title: "Transcription IA en temps réel"
      text: "Le moteur IA transcrit l'audio au fil de l'eau, identifie les interlocuteurs, comprend le vocabulaire sectoriel et filtre le bruit ambiant."
    - title: "Texte intégral prêt à exploiter"
      text: "Vous récupérez une transcription complète, horodatée, avec identification des locuteurs. Base parfaite pour le rapport structuré généré ensuite."
