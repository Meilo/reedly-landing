seo:
  title: "Portfolio Client IA — Reedly"
  description: "Gestion de portefeuille client enrichie par IA. Fiches auto-complétées, historique unifié, score relationnel. Pour commerciaux terrain B2B."
  keywords: ["gestion portefeuille client commercial", "fiche client enrichie IA", "suivi client terrain"]
hero:
  eyebrow: "Portfolio Client"
  title: "Votre <em>gestion portefeuille client</em><br />enrichie automatiquement."
  lead: "Reedly transforme vos rapports de visite en base client vivante. Chaque rendez-vous alimente automatiquement les fiches — profil, besoins, historique, score relationnel. Tout centralisé, rien à ressaisir."
  cta_label: "Essayer gratuitement"
  cta_url: "/fr#trial"
problem:
  eyebrow: "Le problème"
  title: "Les infos clients <em>sont partout.</em><br />Sauf au bon endroit."
  lead: "Les commerciaux terrain accumulent une connaissance client précieuse. Mais elle reste éparpillée dans des carnets, des emails, des CRM jamais mis à jour — et se perd au fil du temps."
  cards:
    - title: "Données clients dispersées"
      text: "Carnets manuscrits, notes vocales, emails, mémoire. Impossible de retrouver ce qui s'est dit il y a trois mois chez un client — encore moins d'avoir une vue d'ensemble."
      icon: "shuffle"
    - title: "CRM jamais à jour"
      text: "Remplir le CRM après chaque visite demande du temps et de la discipline. Résultat : des fiches vides ou obsolètes qui ne servent à personne."
      icon: "alert"
    - title: "Contexte perdu entre visites"
      text: "Qu'avait demandé ce prospect en avril ? Quelle objection avait-il soulevée ? Sans historique structuré, chaque rendez-vous repart de zéro."
      icon: "clock"
solution:
  eyebrow: "La solution"
  title: "L'IA construit votre portfolio<br /><em>rapport après rapport.</em>"
  lead: "Chaque visite enregistrée avec Reedly enrichit automatiquement la fiche client. Profil entreprise, contacts, besoins agrégés, historique complet — tout se met à jour sans effort."
  steps:
    - title: "Enregistrez vos rendez-vous"
      text: "L'application capture vos visites terrain. Chaque échange avec un client alimente automatiquement sa fiche dans votre portfolio."
    - title: "L'IA extrait et structure"
      text: "Reedly identifie les informations clés — interlocuteurs, besoins exprimés, sujets sensibles, engagements pris — et les classe dans les bonnes sections."
    - title: "Votre base client s'enrichit seule"
      text: "Profil entreprise, timeline d'interactions, besoins agrégés, score relationnel : chaque fiche devient un référentiel vivant sans saisie manuelle."
benefits:
  eyebrow: "Bénéfices"
  title: "Un vrai patrimoine client,<br /><em>zéro effort admin.</em>"
  cards:
    - title: "Fiche client auto-enrichie"
      text: "Profil entreprise, contacts, historique complet. L'IA compile automatiquement toutes les informations évoquées lors de vos visites."
      icon: "brain"
    - title: "Timeline unifiée des interactions"
      text: "Tous vos rendez-vous avec un client sur une seule ligne de temps. Retrouvez instantanément ce qui s'est dit à chaque visite."
      icon: "clock"
    - title: "Besoins agrégés par client"
      text: "L'IA regroupe tous les besoins exprimés au fil du temps. Identifiez les demandes récurrentes et les opportunités cross-sell."
      icon: "target"
    - title: "Score relationnel automatique"
      text: "Reedly analyse la qualité des échanges et génère un score relationnel par client. Identifiez les comptes à risque et les ambassadeurs."
      icon: "chart"
    - title: "Préparation de visite instantanée"
      text: "Avant chaque rendez-vous, consultez la fiche client complète. Contexte, historique, derniers engagements — vous arrivez préparé."
      icon: "book"
    - title: "Export vers votre CRM"
      text: "Synchronisez vos fiches enrichies avec Salesforce, HubSpot ou votre outil métier. Les données Reedly alimentent votre écosystème existant."
      icon: "zap"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Qui utilise le Portfolio Client ?"
  cards:
    - title: "Commercial itinérant multicomptes"
      text: "Vous gérez 40+ clients actifs. Le portfolio vous donne une vue instantanée de chaque relation — dernière visite, besoins en cours, prochaine action."
      icon: "users"
    - title: "Équipe commerciale avec rotation"
      text: "Un collègue reprend un territoire ou remplace un absent. Il accède immédiatement à l'historique complet de chaque client sans briefing interminable."
      icon: "shuffle"
    - title: "Manager commercial"
      text: "Vous pilotez 8 commerciaux terrain. Le portfolio centralisé vous permet de voir l'état de chaque compte, d'identifier les risques et d'anticiper les opportunités."
      icon: "compass"
    - title: "Scale-up en forte croissance"
      text: "Votre équipe double chaque année. Le portfolio client devient votre mémoire collective — aucune connaissance ne se perd entre deux départs."
      icon: "chart"
faq:
  - question: "Comment l'IA enrichit-elle les fiches clients ?"
    answer: "À chaque rapport généré après un rendez-vous, Reedly extrait automatiquement les informations structurantes : nom des interlocuteurs, fonction, besoins exprimés, sujets sensibles. Ces données sont ajoutées à la fiche client correspondante sans saisie manuelle."
  - question: "Puis-je modifier les informations du portfolio ?"
    answer: "Oui, toutes les fiches sont éditables. Vous pouvez corriger, compléter ou réorganiser les informations extraites par l'IA. Les modifications sont synchronisées en temps réel sur l'app mobile et le Hub web."
  - question: "Comment fonctionne le score relationnel ?"
    answer: "L'IA analyse la tonalité des échanges, la fréquence des visites, la récurrence des objections, les engagements tenus. Elle génère un score sur 100 qui reflète la qualité de la relation commerciale avec chaque client."
  - question: "Le portfolio est-il partagé avec toute l'équipe ?"
    answer: "Oui, depuis le Hub Manager. Les directeurs commerciaux accèdent au portfolio complet de leur équipe. Chaque commercial voit ses propres clients, sauf configuration spécifique pour les comptes partagés."
  - question: "Puis-je exporter mes données vers mon CRM ?"
    answer: "Oui, Reedly propose des connecteurs Salesforce et HubSpot, ainsi qu'un export CSV pour les autres outils. Les fiches enrichies alimentent automatiquement vos systèmes existants."
  - question: "Que se passe-t-il si je change de téléphone ?"
    answer: "Votre portfolio client est stocké dans le cloud Reedly. Connectez-vous avec vos identifiants sur votre nouveau téléphone : toutes vos fiches, rapports et historiques sont immédiatement disponibles."
