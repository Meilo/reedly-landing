      text: "L'intelligence artificielle détecte les tendances émergentes, identifie les risques (concurrents, objections récurrentes) et extrait les opportunités commerciales à fort potentiel."
    - title: "Recevez la synthèse structurée"
      text: "Vision consolidée en 3 blocs : tendances du territoire, risques priorisés, opportunités actionnables. Prêt pour le comité commercial ou la revue d'équipe."
