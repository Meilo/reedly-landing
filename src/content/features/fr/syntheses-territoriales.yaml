  eyebrow: "Bénéfices"
  title: "La vision stratégique<br /><em>sans la lecture.</em>"
  cards:
    - title: "Gain de temps massif"
      text: "Plus besoin de lire 50 rapports pour préparer le comité commercial. La synthèse territoriale est générée en quelques secondes, prête à partager."
