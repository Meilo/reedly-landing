      icon: "compass"
faq:
  - question: "Sur quelle période puis-je générer une synthèse territoriale ?"
    answer: "Vous choisissez librement la période : dernière semaine, dernier mois, dernier trimestre, ou une plage de dates personnalisée. La synthèse s'adapte automatiquement au volume de rapports."
  - question: "Puis-je filtrer la synthèse par équipe ou par commercial ?"
    answer: "Oui. Vous pouvez générer une synthèse pour l'ensemble du territoire national, une région spécifique, une équipe, ou même un commercial en particulier. Le périmètre est totalement paramétrable."
  - question: "Comment l'IA priorise-t-elle les risques et opportunités ?"
    answer: "L'IA analyse la récurrence (combien de fois un sujet apparaît), la cohérence géographique (présent sur plusieurs zones), et l'impact potentiel (montant des opportunités, gravité des objections). Les insights les plus critiques remontent en tête de synthèse."
  - question: "Les synthèses sont-elles exportables pour les réunions ?"
    answer: "Oui. Chaque synthèse territoriale est exportable en PDF ou partageable via un lien. Idéal pour préparer les comités commerciaux, les revues d'équipe ou les présentations direction."
  - question: "Puis-je comparer deux périodes entre elles ?"
    answer: "Oui. Vous pouvez comparer la synthèse du trimestre actuel avec le trimestre précédent pour identifier les évolutions : nouveaux concurrents, objections qui s'amplifient ou disparaissent, produits qui montent ou descendent."
  - question: "Faut-il configurer quelque chose pour activer les synthèses ?"
    answer: "Non. Dès que vos commerciaux utilisent Reedly pour leurs rapports terrain, les synthèses territoriales sont automatiquement disponibles dans le Hub Manager. Aucune configuration requise."
