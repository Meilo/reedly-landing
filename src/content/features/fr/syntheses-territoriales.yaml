solution:
  eyebrow: "Solution"
  title: "L'analyse territoire commercial<br /><em>générée automatiquement.</em>"
  lead: "Reedly agrège l'ensemble des rapports terrain de vos commerciaux et extrait automatiquement les insights stratégiques du territoire. En quelques secondes, pas en quelques heures."
