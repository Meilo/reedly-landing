    - title: "Les signaux faibles passent inaperçus"
      text: "Un concurrent revient 3 fois cette semaine, une objection prix émerge sur la zone sud — mais ces patterns restent invisibles dans la masse."
      icon: "alert"
    - title: "Vision stratégique obsolète"
      text: "Le temps de compiler les infos et préparer le comité commercial, les données ont déjà 2 semaines. Les décisions se prennent sur du périmé."
