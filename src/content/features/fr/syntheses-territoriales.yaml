      icon: "layers"
    - title: "Comités commerciaux efficaces"
      text: "Démarrez la réunion avec la synthèse territoriale déjà préparée. Le temps est consacré aux décisions, pas à la compilation."
      icon: "users"
    - title: "Traçabilité complète"
