  eyebrow: "Diarisation IA"
  title: "<em>Identification des interlocuteurs</em><br />automatique dans chaque rapport."
  lead: "L'IA identifie qui parle pendant le rendez-vous et attribue chaque propos au bon interlocuteur. Commercial, client, acheteur, décideur — tout est distingué et structuré dans le rapport final."
