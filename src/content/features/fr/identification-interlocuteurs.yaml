  cta_url: "/fr#trial"
problem:
  eyebrow: "Problème"
  title: "Qui a dit quoi ?<br /><em>Impossible à se souvenir.</em>"
  lead: "Dans un RDV avec plusieurs interlocuteurs, les informations clés se mélangent. Qui a exprimé ce besoin ? Qui a soulevé cette objection ? Qui s'est engagé sur cette action ? Sans notes précises, tout devient flou."
  cards:
    - title: "Confusion entre les interlocuteurs"
      text: "Acheteur, prescripteur, décideur — difficile de se rappeler qui a dit quoi une fois sorti de la réunion. Les positions de chacun se confondent."
      icon: "users"
    - title: "Perte d'informations stratégiques"
      text: "Les objections du décideur et les besoins de l'utilisateur final finissent dans le même sac. Impossible de préparer un suivi ciblé pour chaque interlocuteur."
      icon: "alert"
    - title: "Rapports imprécis"
      text: "Les notes manuelles amalgament les propos. Le manager ne sait pas qui porte l'objection budgétaire ni qui valide techniquement — le rapport perd sa valeur."
      icon: "document"
solution:
  eyebrow: "Solution"
  title: "L'IA reconnaît<br /><em>chaque voix.</em>"
  lead: "Reedly analyse l'audio et distingue automatiquement les différents interlocuteurs. Chaque phrase est attribuée à la bonne personne dans la transcription et le rapport structuré."
  steps:
    - title: "Enregistrement multi-voix"
      text: "L'app capture toutes les voix pendant le RDV — commercial, client, acheteur, prescripteur. L'enregistrement distingue les différentes sources sonores."
    - title: "Diarisation automatique"
      text: "L'IA analyse les caractéristiques vocales et segmente la conversation par interlocuteur. Chaque prise de parole est identifiée et numérotée (Interlocuteur 1, 2, 3...)."
    - title: "Attribution dans le rapport"
      text: "Le rapport structuré indique qui a exprimé chaque besoin, objection ou engagement. Le commercial sait précisément qui contacter pour quelle raison au prochain suivi."
benefits:
  eyebrow: "Bénéfices"
  title: "Chaque interlocuteur<br /><em>compte.</em>"
  cards:
    - title: "Rapports précis et exploitables"
      text: "Savoir qui a exprimé quel besoin permet de préparer des arguments ciblés pour chaque interlocuteur au prochain RDV."
      icon: "target"
    - title: "Suivi personnalisé par contact"
      text: "Relancer le décideur sur le budget et l'utilisateur sur la technique — avec les bons arguments pour chacun, tirés du rapport."
      icon: "users"
    - title: "Transparence pour le manager"
      text: "Le manager voit qui porte les objections et qui valide. Il peut coacher le commercial sur la stratégie d'influence pour chaque partie prenante."
      icon: "search"
    - title: "Pas de confusion post-RDV"
      text: "Plus besoin de se creuser la tête pour retrouver qui a dit quoi. Tout est attribué automatiquement dès la génération du rapport."
      icon: "brain"
    - title: "Gain de temps sur les notes"
      text: "Fini les annotations à la main pour distinguer les interlocuteurs. L'IA fait le travail d'identification — le commercial se concentre sur l'écoute."
      icon: "clock"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Qui utilise<br /><em>l'identification des interlocuteurs ?</em>"
  cards:
    - title: "RDV avec plusieurs décideurs"
      text: "Comités d'achat, réunions de validation — le commercial rencontre plusieurs décideurs simultanément. L'IA identifie qui porte chaque position pour adapter le suivi."
      icon: "building"
    - title: "Ventes complexes B2B"
      text: "Acheteur, utilisateur, prescripteur technique — chaque partie prenante a son rôle. Le rapport distingue les propos de chacun pour un argumentaire ciblé."
      icon: "layers"
    - title: "Managers qui coachent l'équipe"
