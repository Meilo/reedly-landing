    - title: "Suivis multi-contacts"
      text: "Le commercial revoit les propos de chaque interlocuteur avant de les recontacter individuellement. Chaque relance est personnalisée grâce à l'historique précis."
      icon: "compass"
faq:
  - question: "Comment l'IA identifie-t-elle qui parle dans la conversation ?"
    answer: "L'IA analyse les caractéristiques vocales (timbre, fréquence, rythme) pour distinguer les différentes voix. Elle segmente ensuite la conversation et attribue chaque prise de parole à un interlocuteur identifié (Interlocuteur 1, 2, 3...). Cette technique s'appelle la diarisation."
  - question: "L'app distingue-t-elle automatiquement le commercial du client ?"
    answer: "Oui. L'IA identifie le commercial (l'utilisateur de l'app) et distingue les autres voix comme étant les interlocuteurs clients. Le rapport attribue ensuite les propos au bon camp — commercial ou client — pour une lecture claire."
  - question: "Combien d'interlocuteurs l'IA peut-elle reconnaître dans un RDV ?"
    answer: "L'IA peut identifier plusieurs interlocuteurs dans une même conversation. Pour un résultat optimal, l'idéal est de limiter à 4-5 personnes maximum. Au-delà, la précision peut diminuer selon la qualité audio et les chevauchements de parole."
  - question: "L'identification fonctionne-t-elle si plusieurs personnes parlent en même temps ?"
    answer: "L'IA fait de son mieux pour distinguer les voix qui se chevauchent, mais la précision dépend de la clarté audio. Pour un résultat optimal, il est recommandé de poser le téléphone au centre de la table et d'éviter les interruptions simultanées."
  - question: "Puis-je renommer les interlocuteurs après le RDV ?"
    answer: "Oui. Une fois le rapport généré, vous pouvez éditer les noms d'interlocuteurs (passer d'Interlocuteur 1 à 'Pierre Dupont - Acheteur'). Cette personnalisation rend le rapport encore plus exploitable pour les suivis et le partage avec le manager."
  - question: "Cette fonctionnalité est-elle conforme au RGPD ?"
    answer: "Oui. L'enregistrement doit respecter les obligations légales en vigueur (information et consentement des participants). L'audio et les données transcrites sont stockés de manière sécurisée, conformément au RGPD. Consultez nos CGU pour plus de détails."
