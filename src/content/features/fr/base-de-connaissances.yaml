seo:
  title: "Base de connaissances commerciale IA · Reedly"
  description: "Centralisez vos documents, argumentaires et supports de vente. L'IA Reedly enrichit automatiquement vos rapports terrain avec la bonne info."
  keywords: [base de connaissances équipe commerciale, knowledge base vente B2B, documentation commerciale IA]
hero:
  eyebrow: "Base de connaissances · Enrichissement IA"
  title: "Votre <em>base de connaissances équipe commerciale</em><br />au service du terrain."
  lead: "Importez fiches produits, argumentaires, études de cas et tarifs. L'IA Reedly puise dans cette base pour enrichir automatiquement chaque rapport terrain avec les informations pertinentes — et répond aux questions via Max."
  cta_label: "Essayer gratuitement"
  cta_url: "/fr#trial"
problem:
  eyebrow: "Problème"
  title: "L'info existe.<br /><em>Personne ne la trouve.</em>"
  lead: "Vos commerciaux ont accès à des dizaines de documents — fiches techniques, argumentaires concurrence, grilles tarifaires. Mais en rendez-vous, impossible de remettre la main sur la bonne référence au bon moment."
  cards:
    - title: "Documents éparpillés"
      text: "Fiches produits dans le drive, tarifs par email, argumentaires dans Notion. Chaque commercial a sa propre organisation — ou aucune."
      icon: "shuffle"
    - title: "Info périmée en circulation"
      text: "L'ancien tarif circule encore, la fiche produit date de 2022, personne ne sait quelle version est la bonne. Résultat : approximations et erreurs terrain."
      icon: "alert"
    - title: "Managers sans visibilité"
      text: "Impossible de savoir si les bons arguments sont utilisés, si les objections sont bien traitées, si le discours est aligné sur la stratégie."
      icon: "compass"
solution:
  eyebrow: "Solution"
  title: "Une <em>documentation commerciale IA</em><br />qui alimente chaque rapport."
  lead: "Reedly transforme vos documents en base de connaissances vectorielle. L'IA y accède en temps réel pour enrichir les rapports terrain et répondre aux questions de vos commerciaux via Max."
  steps:
    - title: "Importez vos documents"
      text: "Glissez fiches produits, argumentaires, tarifs, sites web, liens — tout format accepté. Reedly structure automatiquement votre base de connaissances."
    - title: "L'IA enrichit les rapports"
      text: "À chaque rapport généré, l'IA identifie les produits, objections ou sujets discutés — et injecte automatiquement les infos pertinentes de votre base."
    - title: "Max répond aux questions"
      text: "Votre commercial cherche un argument ? Un tarif ? Une référence client ? Il pose la question à Max — qui répond instantanément à partir de votre base."
benefits:
  eyebrow: "Avantages"
  title: "Tous au même niveau<br /><em>d'information.</em>"
  cards:
    - title: "Discours commercial aligné"
      text: "Tous vos commerciaux utilisent les mêmes arguments, les bons chiffres, les dernières références — sans chercher pendant 10 minutes."
      icon: "target"
    - title: "Rapports plus complets"
      text: "L'IA ajoute automatiquement contexte produit, références techniques, argumentaires concurrence dans chaque rapport terrain."
      icon: "document"
    - title: "Onboarding accéléré"
      text: "Nouveaux commerciaux opérationnels plus vite — toute la connaissance produit accessible via Max, sans formation longue."
      icon: "zap"
    - title: "Info toujours à jour"
      text: "Mettez à jour un document dans la base — il devient immédiatement accessible à toute l'équipe, via IA. Fini les versions qui circulent."
      icon: "shield"
    - title: "Autonomie terrain renforcée"
      text: "Votre commercial répond aux questions client en direct, sans appeler le siège. Max lui fournit la réponse depuis votre base de connaissances."
      icon: "brain"
    - title: "Visibilité manager"
      text: "Vous voyez quels documents sont utilisés, quelles questions reviennent, quels arguments manquent — pour affiner votre documentation."
      icon: "chart"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Qui utilise la base<br /><em>de connaissances Reedly ?</em>"
  cards:
    - title: "Équipes avec catalogue complexe"
      text: "Industriels, distributeurs, éditeurs SaaS — des dizaines de produits, configurations, options tarifaires. La base structure tout et rend l'info accessible instantanément."
      icon: "layers"
    - title: "Organisations multi-sites"
      text: "Plusieurs agences, filiales ou territoires — tous avec accès à la même documentation commerciale centralisée et toujours à jour."
      icon: "globe"
    - title: "Managers qui forment leurs équipes"
      text: "Directeurs commerciaux qui veulent standardiser le discours, accélérer l'onboarding, et s'assurer que les bons arguments sont utilisés terrain."
      icon: "users"
    - title: "Commerciaux face à des objections complexes"
      text: "Questions techniques, comparaisons concurrence, cas d'usage spécifiques — Max répond en puisant dans votre base documentaire."
      icon: "book"
faq:
  - question: "Quels types de documents puis-je importer dans la base de connaissances ?"
    answer: "PDF, Word, Excel, PowerPoint, pages web, liens — tout format texte. Fiches produits, argumentaires, tarifs, études de cas, documentation technique, présentations commerciales."
  - question: "Comment l'IA utilise-t-elle la base de connaissances dans les rapports ?"
    answer: "Pendant la génération du rapport, l'IA identifie les produits, objections ou sujets mentionnés dans la conversation — puis injecte automatiquement les informations pertinentes depuis votre base (caractéristiques, arguments, références)."
  - question: "Max peut-il répondre à n'importe quelle question à partir de ma base ?"
    answer: "Max répond aux questions dont la réponse se trouve dans les documents que vous avez importés. Si l'info n'est pas dans votre base, il vous l'indique — et vous pouvez enrichir la documentation."
  - question: "La base de connaissances est-elle accessible hors ligne ?"
    answer: "Non, l'accès à la base nécessite une connexion internet — Max interroge les documents en temps réel pour fournir des réponses à jour."
  - question: "Puis-je contrôler qui accède à quels documents ?"
    answer: "La base de connaissances est accessible à toute votre organisation Reedly. Les permissions par document ou par équipe arriveront dans une prochaine version."
  - question: "Comment mettre à jour un document dans la base ?"
    answer: "Importez simplement la nouvelle version — elle remplace automatiquement l'ancienne. Tous vos commerciaux ont accès à l'info à jour dès la prochaine utilisation."
