seo:
  title: "Rapport de visite client automatique | Reedly"
  description: "Générez un rapport commercial structuré en 11 sections en moins de 2 minutes. Résumé, besoins, objections, prochaines étapes. Export PDF en 1 clic."
  keywords: 
    - rapport de visite client automatique
    - compte rendu réunion IA
    - rapport commercial automatisé
hero:
  eyebrow: "Rapport structuré IA"
  title: "<em>Rapport de visite client automatique</em><br />en 11 sections."
  lead: "Reedly génère un compte rendu structuré en moins de 2 minutes à partir de votre rendez-vous enregistré : résumé exécutif, besoins identifiés, objections levées, engagements pris, prochaines étapes. Export PDF en 1 clic."
  cta_label: "Essayer 14 jours gratuits"
  cta_url: "/fr#trial"
problem:
  eyebrow: "Problème"
  title: "Trop d'infos à retenir.<br /><em>Trop peu de temps pour noter.</em>"
  lead: "Après chaque rendez-vous, il faut tout se remémorer et structurer un compte-rendu cohérent. Les détails se perdent, les engagements s'oublient, et le CRM reste vide."
  cards:
    - title: "Notes illisibles prises à la volée"
      text: "Griffonnées pendant la réunion ou en voiture juste après, vos notes sont fragmentaires et manquent de structure. Impossible d'en tirer un rapport exploitable."
      icon: "alert"
    - title: "Informations clés oubliées"
      text: "Les objections précises, les deadlines évoquées, les noms des décideurs mentionnés en passant — tout ce qui fait la différence disparaît avant le retour au bureau."
      icon: "shuffle"
    - title: "Rapports incomplets ou inexistants"
      text: "Faute de temps, les comptes-rendus sont bâclés, standardisés ou carrément sautés. Les managers n'ont aucune visibilité sur le terrain."
      icon: "document"
solution:
  eyebrow: "Solution"
  title: "L'IA structure le rapport.<br /><em>Vous gardez les mains libres.</em>"
  lead: "Reedly analyse la transcription complète de votre rendez-vous et génère automatiquement un rapport commercial structuré en 11 sections. Chaque information trouve sa place."
  steps:
    - title: "Enregistrez le rendez-vous"
      text: "Lancez l'enregistrement vocal en 1 tap avant d'entrer chez le client. L'app capture tout l'échange en arrière-plan."
    - title: "L'IA analyse et structure"
      text: "Reedly transcrit l'audio et extrait automatiquement les informations clés pour chaque section du rapport : besoins, objections, engagements, prochaines étapes."
    - title: "Recevez le rapport en 2 minutes"
      text: "Un compte rendu complet en 11 sections apparaît dans l'app. Relisez, ajustez si besoin, exportez en PDF et partagez en 1 clic."
benefits:
  eyebrow: "Avantages"
  title: "Un rapport complet.<br /><em>Sans lever le stylo.</em>"
  cards:
    - title: "11 sections pré-structurées"
      text: "Résumé exécutif, profil client, besoins exprimés, objections et réponses, produits discutés, concurrents, engagements, prochaines étapes, opportunités, risques, recommandations."
      icon: "layers"
    - title: "Export PDF professionnel"
      text: "Transformez le rapport en PDF soigné en 1 clic. Partagez-le par email au client ou au manager directement depuis l'app."
      icon: "download"
    - title: "Cohérence garantie"
      text: "Chaque rapport suit la même structure. Fini les comptes-rendus anarchiques où chacun note à sa façon."
      icon: "document"
    - title: "Aucun oubli possible"
      text: "L'IA extrait tous les engagements, deadlines et actions à mener. Impossible de passer à côté d'une information critique."
      icon: "shield"
    - title: "Gain de temps massif"
      text: "2 minutes contre 45 minutes de rédaction manuelle. Récupérez plus d'une heure par jour à consacrer à la prospection."
      icon: "clock"
    - title: "Historique complet centralisé"
      text: "Tous vos rapports sont stockés dans l'app et synchronisés sur le Hub web. Retrouvez n'importe quel compte-rendu en quelques secondes."
      icon: "search"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Un rapport adapté à chaque métier."
  cards:
    - title: "Commerciaux terrain B2B"
      text: "Générez un compte rendu professionnel après chaque visite client, sans rien taper. Partagez le rapport PDF au prospect dès votre sortie du rendez-vous."
      icon: "target"
    - title: "Sales managers"
      text: "Accédez à tous les rapports de l'équipe sur le Hub web. Identifiez les opportunités et les blocages en un coup d'œil grâce aux sections structurées."
      icon: "users"
    - title: "Directeurs commerciaux"
      text: "Consolidez les rapports de tout le territoire en synthèses automatiques. Pilotez l'activité terrain avec des données fiables et complètes."
      icon: "chart"
    - title: "Ingénieurs commerciaux"
      text: "Capturez les détails techniques évoqués en réunion client : spécifications, objections produit, recommandations. Tout est structuré automatiquement."
      icon: "flask"
faq:
  - question: "Quelles sont les 11 sections du rapport généré par Reedly ?"
    answer: "Le rapport structuré comprend : résumé exécutif, profil client, besoins exprimés, objections et réponses, produits ou services discutés, concurrents mentionnés, engagements mutuels, prochaines étapes et échéances, opportunités identifiées, risques détectés, et recommandations."
  - question: "Combien de temps faut-il pour générer un rapport de visite ?"
    answer: "Moins de 2 minutes après la fin de l'enregistrement. Reedly transcrit l'audio et génère automatiquement le rapport structuré en 11 sections pendant que vous quittez le rendez-vous."
  - question: "Puis-je modifier le rapport généré par l'IA avant de l'exporter ?"
    answer: "Oui, chaque section du rapport est éditable directement dans l'app. Vous pouvez ajuster, compléter ou supprimer des informations avant l'export PDF."
  - question: "Le rapport est-il exportable en PDF ?"
    answer: "Oui, chaque rapport peut être exporté en PDF professionnel en 1 clic. Vous pouvez ensuite le partager par email au client ou au manager directement depuis l'app."
  - question: "Les managers peuvent-ils accéder aux rapports de toute l'équipe ?"
    answer: "Oui, le Hub web Reedly centralise tous les rapports de l'équipe commerciale. Les managers accèdent à l'historique complet et peuvent générer des synthèses territoriales."
  - question: "Le rapport respecte-t-il toujours la même structure ?"
    answer: "Oui, chaque compte rendu suit systématiquement la même structure en 11 sections. Cela garantit la cohérence et facilite l'exploitation des données par les managers."
