faq:
  - question: "Quelles sont les 11 sections du rapport structuré IA ?"
    answer: "Le rapport commercial automatisé généré par Reedly comprend : résumé exécutif, profil client, besoins exprimés, objections et réponses, produits/services discutés, concurrents mentionnés, engagements mutuels, prochaines étapes et échéances, opportunités identifiées, risques détectés, et recommandations stratégiques."
  - question: "Combien de temps prend la génération du rapport de visite client automatique ?"
    answer: "Moins de 2 minutes. Dès que l'enregistrement vocal est terminé, l'IA transcrit l'audio puis génère automatiquement le compte rendu réunion IA structuré en 11 sections. Vous recevez une notification quand le rapport est prêt."
  - question: "Peut-on modifier le rapport avant de l'exporter en PDF ?"
    answer: "Oui. Le rapport commercial automatisé est éditable section par section directement dans l'app. Vous pouvez ajuster, compléter ou retirer des informations avant l'export PDF final."
  - question: "Le format du rapport de visite client est-il personnalisable ?"
    answer: "Le rapport structuré IA suit un format standardisé en 11 sections pour garantir l'homogénéité des comptes-rendus dans toute l'équipe. Chaque section peut être éditée, mais la structure reste constante pour faciliter l'analyse managériale."
  - question: "Comment l'IA identifie-t-elle les objections et opportunités ?"
    answer: "Le moteur IA analyse la transcription du rendez-vous terrain et détecte automatiquement les signaux linguistiques : hésitations, conditions, freins exprimés pour les objections ; besoins non couverts, projets mentionnés, budgets évoqués pour les opportunités. Tout est catégorisé et structuré."
  - question: "Le rapport peut-il être intégré au CRM ?"
    answer: "Oui. L'export PDF en 1 clic vous permet de verser instantanément le rapport de visite client automatique dans votre CRM (Salesforce, HubSpot, Pipedrive, etc.) ou de l'envoyer par email. Aucune ressaisie manuelle requise."
