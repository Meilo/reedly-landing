seo:
  title: "Intégration CRM pour commerciaux terrain | Reedly"
  description: "Connectez Reedly à HubSpot, Salesforce, Slack. Rapports et opportunités poussés automatiquement dans votre CRM. Synchronisation en temps réel."
  keywords: ["intégration CRM commercial terrain", "connecter outil vente CRM", "synchronisation rapport CRM automatique"]
hero:
  eyebrow: "Intégrations CRM & outils"
  title: "<em>Intégration CRM commercial terrain</em><br />sans ressaisie."
  lead: "Connectez Reedly à HubSpot, Salesforce, Slack ou Discord. Chaque rapport généré est automatiquement poussé dans votre CRM et vos canaux d'équipe — avec tous les engagements, opportunités et prochaines étapes. Zéro copier-coller."
  cta_label: "Essayer gratuitement"
  cta_url: "/fr#trial"
problem:
  eyebrow: "Problème"
  title: "Les rapports restent bloqués<br /><em>hors du CRM.</em>"
  lead: "Vos commerciaux génèrent des rapports détaillés sur le terrain, mais les données critiques ne remontent jamais dans le CRM. Entre la ressaisie manuelle et les oublis, votre pipeline reste incomplet."
  cards:
    - title: "Ressaisie dans 3 outils différents"
      text: "Chaque rapport doit être copié manuellement dans le CRM, puis partagé sur Slack, puis archivé en interne. Une perte de temps qui décourage toute rigueur."
      icon: "shuffle"
    - title: "Données dispersées et incomplètes"
      text: "Les engagements clients restent dans les notes. Les opportunités ne sont pas trackées. Le manager n'a aucune visibilité en temps réel sur l'activité terrain."
      icon: "alert"
    - title: "Adoption CRM en chute libre"
      text: "Plus c'est compliqué de remplir le CRM, moins les commerciaux le font. Résultat : des pipelines vides et des prévisions basées sur du vent."
      icon: "chart"
solution:
  eyebrow: "Solution"
  title: "Un rapport généré,<br /><em>tous vos outils synchronisés.</em>"
  lead: "Reedly se connecte directement à vos outils existants. Dès qu'un rapport est généré, il est automatiquement poussé dans votre CRM et vos canaux d'équipe — avec toutes les métadonnées structurées."
  steps:
    - title: "Connectez vos outils en 2 clics"
      text: "Liez votre compte HubSpot, Salesforce, Slack ou Discord depuis le Hub Manager. Configuration en moins de 3 minutes, sans intervention technique."
    - title: "Le rapport se synchronise automatiquement"
      text: "Dès qu'un commercial génère un rapport, Reedly crée ou met à jour la fiche CRM correspondante avec toutes les sections structurées : besoins, objections, engagements, opportunités."
    - title: "Notification instantanée pour l'équipe"
      text: "Le rapport est posté automatiquement sur votre canal Slack ou Discord dédié. Votre manager voit l'activité terrain en temps réel, sans solliciter personne."
benefits:
  eyebrow: "Avantages"
  title: "Vos données terrain,<br /><em>enfin dans le CRM.</em>"
  cards:
    - title: "CRM à jour sans effort"
      text: "Chaque rendez-vous devient une entrée CRM complète et structurée. Fini les fiches vides ou les résumés lapidaires — tout est capturé et synchronisé automatiquement."
      icon: "zap"
    - title: "Visibilité temps réel pour les managers"
      text: "Suivez l'activité de vos commerciaux au fur et à mesure des rendez-vous. Les rapports apparaissent dans Slack ou le Hub dès qu'ils sont générés."
      icon: "globe"
    - title: "Pipeline alimenté en continu"
      text: "Les opportunités identifiées par l'IA sont poussées directement dans le CRM avec leur montant estimé, leur échéance et leur niveau de maturité. Aucune opportunité ne passe entre les mailles."
      icon: "target"
    - title: "Engagement commercial renforcé"
      text: "Plus besoin de forcer vos équipes à remplir le CRM manuellement. La synchronisation automatique élimine la friction et garantit l'adoption."
      icon: "users"
    - title: "API ouverte pour intégrations sur mesure"
      text: "Connectez Reedly à vos outils internes ou à d'autres plateformes via notre API REST. Documentation complète et support technique inclus."
      icon: "layers"
    - title: "Données structurées et exploitables"
      text: "Chaque section du rapport est mappée sur les champs CRM correspondants : contact, entreprise, montant, étape du pipeline, prochaine action. Prêt pour le reporting et les prévisions."
      icon: "compass"
use_cases:
  eyebrow: "Cas d'usage"
  title: "Qui utilise les intégrations Reedly ?"
  cards:
    - title: "Directeurs commerciaux multi-sites"
      text: "Centralisez les rapports de toutes vos équipes dans HubSpot ou Salesforce. Générez des synthèses territoriales et pilotez l'activité depuis un seul outil."
      icon: "building"
    - title: "Sales managers en scale-up"
      text: "Recevez les rapports terrain sur Slack en temps réel. Identifiez les blocages, repérez les opportunités chaudes et coachez vos commerciaux sans attendre le debrief hebdo."
      icon: "chart"
    - title: "Équipes avec CRM maison ou ERP métier"
      text: "Utilisez l'API Reedly pour pousser les rapports dans votre système interne. Synchronisez les données clients, les engagements et les opportunités avec votre stack sur mesure."
      icon: "layers"
    - title: "Commerciaux itinérants B2B"
      text: "Générez vos rapports sur mobile, ils apparaissent automatiquement dans le CRM et sur le canal d'équipe. Votre manager sait où vous en êtes sans vous appeler."
      icon: "globe"
faq:
  - question: "Quels CRM sont compatibles avec Reedly ?"
    answer: "Reedly s'intègre nativement avec HubSpot et Salesforce. Pour les autres CRM (Pipedrive, Zoho, Microsoft Dynamics, ou outils maison), vous pouvez utiliser notre API REST pour créer une intégration sur mesure."
  - question: "Les rapports sont-ils poussés automatiquement ou faut-il les envoyer manuellement ?"
    answer: "Tout est automatique. Dès qu'un commercial génère un rapport dans l'app Reedly, celui-ci est synchronisé en temps réel avec le CRM et posté sur les canaux Slack ou Discord configurés. Aucune action manuelle requise."
  - question: "Peut-on choisir quelles sections du rapport sont envoyées au CRM ?"
    answer: "Oui. Depuis le Hub Manager, vous configurez le mapping entre les sections Reedly et les champs de votre CRM. Vous pouvez exclure certaines sections ou les rediriger vers des champs personnalisés."
  - question: "L'intégration Slack envoie-t-elle tous les rapports dans un seul canal ?"
    answer: "Vous choisissez le canal de destination lors de la configuration. Vous pouvez créer plusieurs canaux (un par territoire, un par produit, etc.) et router les rapports selon des règles définies dans le Hub."
  - question: "Que se passe-t-il si le CRM est momentanément indisponible ?"
    answer: "Reedly stocke temporairement les rapports et retente la synchronisation automatiquement jusqu'à ce que la connexion soit rétablie. Aucun rapport n'est perdu, même en cas de panne CRM."
  - question: "L'API Reedly est-elle documentée et gratuite ?"
    answer: "L'API est documentée et accessible à tous les clients Reedly sans surcoût. Vous trouverez la documentation complète, les endpoints et des exemples d'intégration dans le Hub Manager."
